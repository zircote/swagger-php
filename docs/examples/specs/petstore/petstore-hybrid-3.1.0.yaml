openapi: 3.1.0
info:
    title: 'Swagger Petstore'
    description: "This is a sample Petstore server.\nYou can find out more about Swagger at [http://swagger.io](http://swagger.io)\nor on [irc.freenode.net, #swagger](http://swagger.io/irc/)."
    termsOfService: 'http://swagger.io/terms/'
    contact:
        email: apiteam@swagger.io
    license:
        name: 'Apache 2.0'
        url: 'http://www.apache.org/licenses/LICENSE-2.0.html'
    version: 1.0.0
servers:
    - url: 'https://petstore.com/1.0.0'
      description: 'Petstore API'
paths:
    /pet:
        post:
            tags:
                - pet
            summary: 'Add a new pet to the store.'
            operationId: addPet
            requestBody:
                $ref: '#/components/requestBodies/Pet'
            responses:
                405:
                    description: 'Invalid input'
            security:
                -
                    petstore_auth:
                        - 'write:pets'
                        - 'read:pets'
        put:
            tags:
                - pet
            summary: 'Update an existing pet.'
            operationId: updatePet
            requestBody:
                $ref: '#/components/requestBodies/Pet'
            responses:
                400:
                    description: 'Invalid ID supplied'
                404:
                    description: 'Pet not found'
                405:
                    description: 'Validation exception'
            security:
                -
                    petstore_auth:
                        - 'write:pets'
                        - 'read:pets'
    /pet/findByStatus:
        get:
            tags:
                - pet
            summary: 'Finds Pets by status'
            description: 'Multiple status values can be provided with comma separated string'
            operationId: findPetsByStatus
            parameters:
                -
                    name: status
                    in: query
                    description: 'Status values that needed to be considered for filter'
                    required: true
                    explode: true
                    schema:
                        type: string
                        enum:
                            - available
                            - pending
                            - sold
                        default: available
            responses:
                200:
                    description: 'successful operation'
                    content:
                        application/json:
                            schema:
                                type: array
                                items:
                                    $ref: '#/components/schemas/Pet'
                        application/xml:
                            schema:
                                type: array
                                items:
                                    $ref: '#/components/schemas/Pet'
                400:
                    description: 'Invalid status value'
            deprecated: true
            security:
                -
                    petstore_auth:
                        - 'write:pets'
                        - 'read:pets'
    /pet/findByTags:
        get:
            tags:
                - pet
            summary: 'Finds Pets by tags'
            description: 'Muliple tags can be provided with comma separated strings. Use tag1, tag2, tag3 for testing.'
            operationId: findByTags
            parameters:
                -
                    name: tags
                    in: query
                    description: 'Tags to filter by'
                    required: true
                    explode: true
                    schema:
                        type: array
                        items:
                            type: string
            responses:
                200:
                    description: 'successful operation'
                    content:
                        application/json:
                            schema:
                                type: array
                                items:
                                    $ref: '#/components/schemas/Pet'
                        application/xml:
                            schema:
                                type: array
                                items:
                                    $ref: '#/components/schemas/Pet'
                400:
                    description: 'Invalid tag value'
            security:
                -
                    petstore_auth:
                        - 'write:pets'
                        - 'read:pets'
    '/pet/{petId}':
        get:
            tags:
                - pet
            summary: 'Find pet by ID'
            description: 'Returns a single pet'
            operationId: getPetById
            parameters:
                -
                    name: petId
                    in: path
                    description: 'ID of pet to return'
                    required: true
                    schema:
                        type: integer
                        format: int64
            responses:
                200:
                    description: 'successful operation'
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Pet'
                        application/xml:
                            schema:
                                $ref: '#/components/schemas/Pet'
                400:
                    description: 'Invalid ID supplier'
                404:
                    description: 'Pet not found'
            security:
                -
                    api_key: []
        post:
            tags:
                - pet
            summary: 'Updates a pet in the store with form data'
            operationId: updatePetWithForm
            parameters:
                -
                    name: petId
                    in: path
                    description: 'ID of pet that needs to be updated'
                    required: true
                    schema:
                        type: integer
                        format: int64
            requestBody:
                description: 'Input data format'
                content:
                    application/x-www-form-urlencoded:
                        schema:
                            type: object
                            properties:
                                name:
                                    type: string
                                    description: 'Updated name of the pet'
                                status:
                                    type: string
                                    description: 'Updated status of the pet'
            responses:
                405:
                    description: 'Invalid input'
            security:
                -
                    petstore_auth:
                        - 'write:pets'
                        - 'read:pets'
        delete:
            tags:
                - pet
            summary: 'Deletes a pet'
            operationId: deletePet
            parameters:
                -
                    name: api_key
                    in: header
                    required: false
                    schema:
                        type: string
                -
                    name: petId
                    in: path
                    description: 'Pet id to delete'
                    required: true
                    schema:
                        type: integer
                        format: int64
            responses:
                400:
                    description: 'Invalid ID supplied'
                404:
                    description: 'Pet not found'
            security:
                -
                    petstore_auth:
                        - 'write:pets'
                        - 'read:pets'
    '/pet/{petId}/uploadImage':
        post:
            tags:
                - pet
            summary: 'uploads an image'
            operationId: uploadFile
            parameters:
                -
                    name: petId
                    in: path
                    description: 'ID of pet to update'
                    required: true
                    schema:
                        type: integer
                        format: int64
                        example: 1
            requestBody:
                description: 'Upload images request body'
                content:
                    application/octet-stream:
                        schema:
                            type: string
                            format: binary
            responses:
                200:
                    description: 'successful operation'
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ApiResponse'
            security:
                -
                    petstore_auth:
                        - 'write:pets'
                        - 'read:pets'
    /store:
        get:
            tags:
                - store
            summary: 'Returns pet inventories by status'
            description: 'Returns a map of status codes to quantities'
            operationId: getInventory
            responses:
                200:
                    description: 'successful operation'
                    content:
                        application/json:
                            schema:
                                additionalProperties:
                                    type: integer
                                    format: int32
            security:
                -
                    api_key: []
    /store/order:
        post:
            tags:
                - store
            summary: 'Place an order for a pet'
            operationId: placeOrder
            requestBody:
                description: 'order placed for purchasing the pet'
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/Order'
                required: true
            responses:
                200:
                    description: 'successful operation'
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Order'
                        application/xml:
                            schema:
                                $ref: '#/components/schemas/Order'
    '/store/order/{orderId}':
        get:
            tags:
                - store
            description: 'For valid response try integer IDs with value >= 1 and <= 10. Other values will generated exceptions'
            operationId: getOrderById
            parameters:
                -
                    name: orderId
                    in: path
                    description: 'ID of pet that needs to be fetched'
                    required: true
                    schema:
                        type: integer
                        format: int64
                        minimum: 1
                        maximum: 10
            responses:
                200:
                    description: 'successful operation'
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Order'
                        application/xml:
                            schema:
                                $ref: '#/components/schemas/Order'
                400:
                    description: 'Invalid ID supplied'
                404:
                    description: 'Order not found'
        delete:
            tags:
                - store
            summary: 'Delete purchase order by ID'
            description: 'For valid response try integer IDs with positive integer value. Negative or non-integer values will generate API errors'
            operationId: deleteOrder
            parameters:
                -
                    name: orderId
                    in: path
                    description: 'ID of the order that needs to be deleted'
                    required: true
                    schema:
                        type: integer
                        format: int64
                        minimum: 1
            responses:
                400:
                    description: 'Invalid ID supplied'
                404:
                    description: 'Order not found'
    /user:
        post:
            tags:
                - user
            summary: 'Create user'
            description: 'This can only be done by the logged in user.'
            operationId: createUser
            requestBody:
                description: 'Create user object'
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/User'
                required: true
            responses:
                default:
                    description: 'successful operation'
    /user/createWithArray:
        post:
            tags:
                - user
            summary: 'Create list of users with given input array'
            operationId: createUsersWithListInput
            requestBody:
                $ref: '#/components/requestBodies/UserArray'
            responses:
                default:
                    description: 'successful operation'
    /user/login:
        get:
            tags:
                - user
            summary: 'Logs user into system'
            operationId: loginUser
            parameters:
                -
                    name: username
                    in: query
                    description: 'The user name for login'
                    required: true
                    schema:
                        type: string
                -
                    name: password
                    in: query
                    required: true
                    schema:
                        type: string
            responses:
                200:
                    description: 'successful operation'
                    headers:
                        X-Rate-Limit:
                            description: 'calls per hour allowed by the user'
                            schema:
                                type: integer
                                format: int32
                        X-Expires-After:
                            description: 'date in UTC when token expires'
                            schema:
                                type: string
                                format: datetime
                    content:
                        application/json:
                            schema:
                                type: string
                        application/xml:
                            schema:
                                type: string
                400:
                    description: 'Invalid username/password supplied'
    /user/logout:
        get:
            tags:
                - user
            summary: 'Logs out current logged in user session'
            operationId: logoutUser
            responses:
                default:
                    description: 'successful operation'
    '/user/{username}':
        get:
            summary: 'Get user by user name'
            operationId: getUserByName
            parameters:
                -
                    name: username
                    in: path
                    required: true
                    schema:
                        type: string
            responses:
                200:
                    description: 'successful operation'
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/User'
                        application/xml:
                            schema:
                                $ref: '#/components/schemas/User'
                400:
                    description: 'Invalid username supplied'
                404:
                    description: 'User not found'
        put:
            summary: 'Update user'
            description: 'This can only be done by the logged in user.'
            operationId: updateUser
            parameters:
                -
                    name: username
                    in: path
                    description: 'name that to be updated'
                    required: true
                    schema:
                        type: string
            requestBody:
                description: 'Updated user object'
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/User'
                required: true
            responses:
                400:
                    description: 'Invalid user supplied'
                404:
                    description: 'User not found'
        delete:
            summary: 'Delete user'
            description: 'This can only be done by the logged in user.'
            operationId: deleteUser
            parameters:
                -
                    name: username
                    in: path
                    description: 'The name that needs to be deleted'
                    required: true
                    schema:
                        type: string
            responses:
                400:
                    description: 'Invalid username supplied'
                404:
                    description: 'User not found'
tags:
    -
        name: pet
        description: 'Everything about your Pets'
        externalDocs:
            url: 'http://swagger.io'
            description: 'Find out more'
    - name: store
      description: 'Access to Petstore orders'
    -
        name: user
        description: 'Operations about user'
        externalDocs:
            url: 'http://swagger.io'
            description: 'Find out more about store'
externalDocs:
    url: 'http://swagger.io'
    description: 'Find out more about Swagger'
components:
    schemas:
        ApiResponse:
            type: object
            title: 'Api response'
            description: 'Api response'
            properties:
                code:
                    type: integer
                    format: int32
                    title: Code
                    description: Code
                type:
                    type: string
                    title: Type
                    description: Type
                message:
                    type: string
                    title: Message
                    description: Message
        Category:
            type: object
            title: 'Pets Category.'
            description: 'Pets Category.'
            properties:
                id:
                    type: integer
                    format: int64
                    title: ID
                    description: ID
                name:
                    type: string
                    title: 'Category name'
                    description: 'Category name'
            xml:
                name: Category
        Order:
            type: object
            title: 'Order model'
            description: 'Order model'
            properties:
                id:
                    type: integer
                    format: int64
                    title: ID
                    description: ID
                    default: 1
                petId:
                    type: integer
                    format: int64
                    title: 'Pet ID'
                    description: 'Pet ID'
                    default: 1
                quantity:
                    type: integer
                    format: int32
                    title: Quantity
                    description: Quantity
                    default: 12
                shipDate:
                    type: string
                    format: datetime
                    title: 'Shipping date'
                    description: 'Shipping date'
                    default: '2017-02-02 18:31:45'
                status:
                    type: string
                    title: 'Order status'
                    description: 'Order status'
                    enum:
                        - placed
                        - approved
                        - delivered
                    default: placed
                complete:
                    type: boolean
                    title: 'Complete status'
                    description: 'Complete status'
                    default: false
        Pet:
            type: object
            title: 'Pet model'
            description: 'Pet model'
            properties:
                id:
                    type: integer
                    format: int64
                    title: ID
                    description: ID
                category:
                    $ref: '#/components/schemas/Category'
                name:
                    type: string
                    format: int64
                    title: 'Pet name'
                    description: 'Pet name'
                photoUrls:
                    type: array
                    title: 'Photo urls'
                    description: 'Photo urls'
                    items:
                        type: string
                        default: images/image-1.png
                    xml:
                        name: photoUrl
                        wrapped: true
                tags:
                    type: array
                    title: 'Pet tags'
                    description: 'Pet tags'
                    items:
                        $ref: '#/components/schemas/Tag'
                    xml:
                        name: tag
                        wrapped: true
            required:
                - name
                - photoUrls
            xml:
                name: Pet
        Tag:
            type: object
            title: Tag
            description: Tag.
            properties:
                id:
                    type: integer
                    format: int64
                    title: ID
                    description: ID
                name:
                    type: string
                    title: Name
                    description: Name
            xml:
                name: Tag
        User:
            type: object
            title: 'User model'
            description: 'User model'
            properties:
                id:
                    type: integer
                    format: int64
                    title: ID
                    description: ID
                username:
                    type: string
                    title: Username
                    description: Username
                firstName:
                    type: string
                    title: 'First name'
                    description: 'First name'
                lastName:
                    type: string
                    title: 'Last name'
                    description: 'Last name'
                email:
                    type: string
                    format: email
                    title: Email
                    description: Email
                password:
                    type: string
                    title: Password
                    description: Password
                    maximum: 255
                phone:
                    type: string
                    format: msisdn
                    title: Phone
                    description: Phone
                userStatus:
                    type: integer
                    format: int32
                    title: 'User status'
                    description: 'User status'
    requestBodies:
        Pet:
            description: 'Pet object that needs to be added to the store'
            content:
                application/xml:
                    schema:
                        $ref: '#/components/schemas/Pet'
                application/json:
                    schema:
                        $ref: '#/components/schemas/Pet'
            required: true
        UserArray:
            description: 'List of user object'
            content:
                application/json:
                    schema:
                        type: array
                        items:
                            $ref: '#/components/schemas/User'
            required: true
    securitySchemes:
        petstore_auth:
            type: oauth2
            flows:
                implicit:
                    authorizationUrl: 'http://petstore.swagger.io/oauth/dialog'
                    scopes:
                        'write:pets': 'modify pets in your account'
                        'read:pets': 'read your pets'
        api_key:
            type: apiKey
            name: api_key
            in: header
