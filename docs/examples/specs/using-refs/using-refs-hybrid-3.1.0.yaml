openapi: 3.1.0
info:
    title: 'Example of using references in swagger-php'
    version: 1.0.0
paths:
    '/products/{product_id}':
        get:
            tags:
                - Products
            operationId: f5eb54ff316bd7b5255abc39c03636c3
            responses:
                default:
                    $ref: '#/components/responses/product'
        patch:
            tags:
                - Products
            operationId: 8324867747a5d4de63ad0910f1e69188
            requestBody:
                $ref: '#/components/requestBodies/product_in_body'
            responses:
                default:
                    $ref: '#/components/responses/product'
        parameters:
            - $ref: '#/components/parameters/product_id_in_path_required'
    '/products/{product_id}/do-other-stuff':
        get:
            tags:
                - Products
            operationId: 94496bbfc18b0bb7d67302b6bafd6548
            parameters:
                - $ref: '#/components/schemas/Product/properties/id'
            responses:
                default:
                    $ref: '#/components/responses/todo'
tags:
    - name: Products
      description: Products
components:
    schemas:
        Model:
            description: 'A model'
        product_status:
            type: string
            description: 'The status of a product'
            enum:
                - available
                - discontinued
            default: available
        Product:
            type: object
            title: 'Product model'
            description: 'Product model'
            allOf:
                - $ref: '#/components/schemas/Model'
                -
                    type: object
                    properties:
                        id:
                            type: integer
                            format: int64
                            description: 'The unique identifier of a product in our catalog.'
                            example: 1
                        status:
                            $ref: '#/components/schemas/product_status'
                        stockLevel:
                            $ref: '#/components/schemas/StockLevel'
        StockLevel:
            type: string
            enum:
                - AVAILABLE
                - SOLD_OUT
                - BACK_ORDER
    responses:
        product:
            description: 'All information about a product'
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/Product'
        todo:
            description: 'This API call has no documentated response (yet)'
    parameters:
        product_id_in_path_required:
            name: product_id
            in: path
            description: 'The ID of the product'
            required: true
            schema:
                type: integer
                format: int64
    requestBodies:
        product_in_body:
            description: product_request
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/Product'
            required: true
