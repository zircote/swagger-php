openapi: 3.1.0
info:
    title: 'Webhook Example'
    version: 1.0.0
webhooks:
    newPet:
        post:
            operationId: new-pet
            requestBody:
                description: 'Information about a new pet in the system'
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/Pet'
            responses:
                200:
                    description: 'Return a 200 status to indicate that the data was received successfully'
components:
    schemas:
        Pet:
            type: object
            properties:
                id:
                    type: integer
                    format: int64
                name:
                    type: string
                tag:
                    type: string
            required:
                - id
                - name
