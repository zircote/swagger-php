openapi: 3.2.0
info:
    title: 'Example of using interfaces in swagger-php'
    description: 'Using interfaces'
    contact:
        name: 'Swagger API Team'
    version: 1.0.0
servers:
    - url: 'https://example.localhost'
      description: 'API server'
paths:
    '/products/{id}':
        get:
            tags:
                - api
            description: 'Get product in any colour for id'
            operationId: getProduct
            parameters:
                -
                    name: id
                    in: path
                    description: 'ID of product to return'
                    required: true
                    schema:
                        type: string
            responses:
                200:
                    description: 'successful operation'
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Product'
    '/products/green/{id}':
        get:
            tags:
                - api
            description: 'Get green products'
            operationId: getGreenProduct
            parameters:
                -
                    name: id
                    in: path
                    description: 'ID of product to return'
                    required: true
                    schema:
                        type: string
            responses:
                200:
                    description: 'successful operation'
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/GreenProduct'
tags:
    - name: api
      description: 'API operations'
components:
    schemas:
        GreenProduct:
            type: object
            title: GreenProduct
            allOf:
                - $ref: '#/components/schemas/Product'
                -
                    type: object
                    properties:
                        color:
                            description: 'The product color.'
                            example: blue
        Product:
            type: object
            title: 'Product model'
            allOf:
                - $ref: '#/components/schemas/ProductInterface'
                -
                    type: object
                    properties:
                        id:
                            type: integer
                            format: int64
                            description: 'The unique identifier of a product in our catalog.'
                            example: 1
        ProductInterface:
            type: object
            properties:
                name:
                    description: 'The product name.'
                    example: toaster
