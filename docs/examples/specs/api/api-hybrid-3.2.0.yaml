openapi: 3.2.0
info:
    title: 'Basic single file API'
    license:
        name: MIT
        identifier: MIT
    version: 1.0.0
servers:
    - url: 'https://localhost/api'
      description: 'API server'
    - url: 'https://example.localhost'
      description: 'The local environment.'
    - url: 'https://example.com'
      description: 'The production server.'
paths:
    '/products/{product_id}':
        get:
            tags:
                - products
            summary: 'Get a product.'
            operationId: getProducts
            parameters:
                -
                    name: product_id
                    in: path
                    description: 'the product id'
                    required: true
                    schema:
                        type: integer
            responses:
                200:
                    description: 'successful operation'
                    headers:
                        X-Rate-Limit:
                            description: 'calls per hour allowed by the user'
                            schema:
                                type: integer
                                format: int32
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Product'
                401:
                    description: oops
    /products:
        post:
            tags:
                - products
            summary: 'Add products'
            description: 'Add a product.'
            operationId: addProducts
            requestBody:
                description: 'New product'
                content:
                    application/json:
                        schema:
                            type: array
                            items:
                                $ref: '#/components/schemas/Product'
                required: true
            responses:
                200:
                    description: 'successful operation'
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Product'
        get:
            tags:
                - products
                - catalog
            summary: 'Get all.'
            operationId: getAll
            responses:
                200:
                    description: 'successful operation'
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    data: { type: array, items: { $ref: '#/components/schemas/Product' } }
                                required:
                                    - data
                401:
                    description: oops
    /subscribe:
        post:
            tags:
                - products
            summary: 'Subscribe to product webhook'
            operationId: subscribe
            parameters:
                - name: callbackUrl
                  in: query
            responses:
                200:
                    description: 'callbackUrl registered'
            callbacks:
                onChange:
                    '{$request.query.callbackUrl}':
                        post:
                            requestBody:
                                description: 'subscription payload'
                                content:
                                    application/json: { schema: { properties: { timestamp: { type: string, format: date-time, description: 'time of change' } } } }
                        responses:
                            200:
                                description: 'Your server implementation should return this HTTP status code if the data was received successfully'
tags:
    - name: products
      description: 'All about products'
    - name: catalog
      description: 'Catalog API'
security:
    -
        bearerAuth: []
components:
    schemas:
        Colour:
            type: string
            description: 'A Colour.'
            enum:
                - GREEN
                - BLUE
                - RED
        NameTrait:
            type: object
            description: 'A Name.'
            properties:
                name:
                    description: 'The name.'
        Product:
            type: object
            title: Product
            description: 'A Product.'
            allOf:
                - $ref: '#/components/schemas/NameTrait'
                -
                    type: object
                    properties:
                        quantity:
                            type: integer
                        id:
                            format: int64
                            description: 'The id.'
                            example: 1
                        releasedAt:
                            type: string
                        brand:
                            type:
                                - string
                                - 'null'
                            default: null
                            example: null
                        colour:
                            $ref: '#/components/schemas/Colour'
                            description: 'The colour'
                        kind:
                            type: string
                            description: 'The kind.'
                            const: Virtual
    securitySchemes:
        bearerAuth:
            type: http
            description: 'Basic Auth'
            scheme: bearer
